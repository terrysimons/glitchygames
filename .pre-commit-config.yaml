# We don't need to do this seperately, because nox will run the tests
- repo: local
  hooks:
    - id: mkdocs
      name: mkdocs
      files: ^.*\.py$
      language: python
      entry: mkdocs build --strict
      types: [python]
      stages: [pre-push]
      pass_filenames: false

# YAML linting for all YAML/YML files (including CI configs)
- repo: https://github.com/adrienverge/yamllint
  rev: v1.38.0
  hooks:
    - id: yamllint
      args: [--strict]
      stages: [pre-push]

# CircleCI config validation
- repo: local
  hooks:
    - id: circleci-config-validate
      name: circleci config validate
      files: ^\.circleci/config\.yml$
      language: system
      entry: circleci config validate
      pass_filenames: false
      stages: [pre-push]

# TOML linting and formatting
- repo: https://github.com/ComPWA/taplo-pre-commit
  rev: v0.9.3
  hooks:
    - id: taplo-lint
      stages: [pre-push]
    - id: taplo-format
      stages: [pre-push]

# GitHub Actions workflow linting
- repo: https://github.com/rhysd/actionlint
  rev: v1.7.11
  hooks:
    - id: actionlint
      stages: [pre-push]

# Dependency checking
- repo: local
  hooks:
    - id: deptry
      name: deptry
      language: system
      entry: deptry .
      pass_filenames: false
      files: ^(pyproject\.toml|glitchygames/.*)$
      stages: [pre-push]

# Dead code detection
- repo: https://github.com/jendrikseipp/vulture
  rev: v2.15
  hooks:
    - id: vulture
      args: [glitchygames, vulture_whitelist.py, --min-confidence=80]
      pass_filenames: false
      stages: [pre-push]

# Dependency vulnerability auditing
# CVE-2026-2473: google-cloud-aiplatform pinned at 1.71.1 by vertexai (via aisuite[all]).
# Fix requires google-cloud-aiplatform>=1.133.0 which needs httpx>=0.28.1,
# but aisuite pins httpx<0.28.0. Blocked until upstream aisuite updates.
- repo: local
  hooks:
    - id: pip-audit
      name: pip-audit
      language: system
      entry: bash -c 'uv export --quiet --no-emit-project | pip-audit --requirement /dev/stdin --require-hashes --disable-pip --ignore-vuln CVE-2026-2473'
      files: ^(pyproject\.toml|uv\.lock)$
      pass_filenames: false
      stages: [pre-push]

- repo: https://github.com/DetachHead/basedpyright-pre-commit-mirror
  rev: 1.38.2
  hooks:
    - id: basedpyright
      pass_filenames: false # TODO: document
      stages: [pre-push]

# Type checking with ty
- repo: local
  hooks:
    - id: ty
      name: ty
      language: system
      entry: ty check
      types: [python]
      pass_filenames: false
      stages: [pre-push]
