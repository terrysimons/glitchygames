repos:
- repo: local
  hooks:
    - id: format
      name: format (ruff, taplo)
      language: system
      entry: nox -s format
      pass_filenames: false
      stages: [pre-push]

    - id: lint
      name: lint (ruff, docs, yaml, toml, ci, deps, dead code, cves)
      language: system
      entry: nox -s lint
      pass_filenames: false
      stages: [pre-push]

    - id: static-analysis
      name: static-analysis (basedpyright, ty)
      language: system
      entry: nox -s static-analysis
      pass_filenames: false
      stages: [pre-push]

    - id: security-scan
      name: security-scan (bandit, safety)
      language: system
      entry: nox -s security-scan
      pass_filenames: false
      stages: [pre-push]
