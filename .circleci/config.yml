# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# TODO:  Turn hard coded version strings into variables
# parameters:
#   action:
#     type: enum
#     enum: [build, report]
#     default: build
parameters:
  PYTHON_LATEST_VERSION:
    type: string
    default: "3.13.12"
  XCODE_LATEST_VERSION:
    type: string
    default: "26.3.0"

orbs:
  win: circleci/windows@5.1.1
  macos: circleci/macos@2.5.4
  jira: circleci/jira@2.2.0
  slack: circleci/slack@6.1.3

commands:
  restore-uv-cache-posix:
    steps:
      - restore_cache:
          keys:
            - uv-cache-v1-{{ arch }}-{{ checksum "uv.lock" }}
            - uv-cache-v1-{{ arch }}-

  save-uv-cache-posix:
    steps:
      - save_cache:
          key: uv-cache-v1-{{ arch }}-{{ checksum "uv.lock" }}
          paths:
            - ~/.cache/uv
            - ~/.local/share/uv

  restore-venv-posix:
    steps:
      - restore_cache:
          keys:
            - venv-v1-{{ arch }}-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-{{ checksum "uv.lock" }}
            - venv-v1-{{ arch }}-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-

  save-venv-posix:
    steps:
      - save_cache:
          key: venv-v1-{{ arch }}-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-{{ checksum "uv.lock" }}
          paths:
            - .venv

  install-deps-posix:
    steps:
      - run:
          name: "Install uv and dependencies"
          command: |
            set -euo pipefail

            curl -LsSf https://astral.sh/uv/install.sh | sh
            export PATH="$HOME/.local/bin:$PATH"

            uv --version
            python --version

            # Use the requested interpreter (download if needed on this executor)
            uv python install "<< pipeline.parameters.PYTHON_LATEST_VERSION >>"
            uv venv --clear --python "<< pipeline.parameters.PYTHON_LATEST_VERSION >>"

            # Reproducible, lockfile-based install
            uv sync --frozen --extra dev --extra docs

  nox-format:
    steps:
      - run:
          name: "Format check"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s format

  nox-lint:
    steps:
      - run:
          name: "Lint (ruff)"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s lint

  nox-static-analysis:
    steps:
      - run:
          name: "Static analysis (basedpyright)"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s static_analysis

  nox-lint-docs:
    steps:
      - run:
          name: "Lint docs (mkdocs)"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s lint_docs

  nox-test:
    steps:
      - run:
          name: "Tests (pytest + coverage)"
          no_output_timeout: 60m
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s test
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results
      - store_artifacts:
          path: htmlcov
          destination: coverage-html

  nox-security-scan:
    steps:
      - run:
          name: "Security scan (bandit + safety)"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s security_scan

  nox-performance-test:
    steps:
      - run:
          name: "Performance benchmarks"
          command: |
            export PATH="$HOME/.local/bin:$PATH"
            uv run nox -s performance_test

  restore-uv-cache-windows:
    steps:
      - restore_cache:
          keys:
            - uv-cache-v1-windows-{{ checksum "uv.lock" }}
            - uv-cache-v1-windows-

  save-uv-cache-windows:
    steps:
      - save_cache:
          key: uv-cache-v1-windows-{{ checksum "uv.lock" }}
          paths:
            - C:\Users\circleci\AppData\Local\uv\cache
            - C:\Users\circleci\AppData\Local\uv\python

  restore-venv-windows:
    steps:
      - restore_cache:
          keys:
            - venv-v1-windows-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-{{ checksum "uv.lock" }}
            - venv-v1-windows-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-

  save-venv-windows:
    steps:
      - save_cache:
          key: venv-v1-windows-py<< pipeline.parameters.PYTHON_LATEST_VERSION >>-{{ checksum "uv.lock" }}
          paths:
            - .venv

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/2.0/configuration-reference/#jobs
jobs:
  build-and-test-linux:
    # Specify the execution environment. You can specify an image from Dockerhub or use one of our Convenience Images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/2.0/configuration-reference/#docker-machine-macos-windows-executor
    docker:
      - image: cimg/python:<< pipeline.parameters.PYTHON_LATEST_VERSION >>
    # Add steps to the job
    # See: https://circleci.com/docs/2.0/configuration-reference/#steps

    resource_class: medium

    steps:
      - checkout

      - run:
          name: "Install Linux system dependencies"
          command: |
            set -euo pipefail
            sudo apt-get update
            sudo apt-get install -y fontconfig

      - restore-uv-cache-posix
      - restore-venv-posix
      - install-deps-posix
      - save-venv-posix
      - save-uv-cache-posix
      - nox-format
      - nox-lint
      - nox-static-analysis
      - nox-lint-docs
      - nox-test
      - nox-security-scan
      - nox-performance-test

  build-and-test-macos:
    macos:
      xcode: << pipeline.parameters.XCODE_LATEST_VERSION >>
    resource_class: m4pro.medium

    steps:
      - checkout

      - restore-uv-cache-posix
      - restore-venv-posix
      - install-deps-posix
      - save-venv-posix
      - save-uv-cache-posix
      - nox-format
      - nox-lint
      - nox-static-analysis
      - nox-lint-docs
      - nox-test
      - nox-security-scan
      - nox-performance-test

  build-and-test-windows:
    executor:
      name: win/default
      size: medium

    steps:
      - checkout

      - restore-uv-cache-windows
      - restore-venv-windows
      - run:
          name: "Install uv and dependencies"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"

            # Install uv
            irm https://astral.sh/uv/install.ps1 | iex
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"

            uv --version

            # Provision Python + env
            uv python install "<< pipeline.parameters.PYTHON_LATEST_VERSION >>"
            uv venv --clear --python "<< pipeline.parameters.PYTHON_LATEST_VERSION >>"

            # Reproducible, lockfile-based install
            uv sync --frozen --extra dev --extra docs
      - save-venv-windows
      - save-uv-cache-windows
      - run:
          name: "Format check"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s format
      - run:
          name: "Lint (ruff)"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s lint
      - run:
          name: "Static analysis (basedpyright)"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s static_analysis
      - run:
          name: "Lint docs (mkdocs)"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s lint_docs
      - run:
          name: "Tests (pytest + coverage)"
          no_output_timeout: 60m
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s test
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results
      - store_artifacts:
          path: htmlcov
          destination: coverage-html
      - run:
          name: "Security scan (bandit + safety)"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s security_scan
      - run:
          name: "Performance benchmarks"
          shell: powershell.exe
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.local\bin;$env:PATH"
            uv run nox -s performance_test


# Invoke jobs via workflows
# See: https://circleci.com/docs/2.0/configuration-reference/#workflows
workflows:
  build-and-test:
    jobs:
      - build-and-test-linux:
          context:
            - SAFETY_API_KEY
      - build-and-test-macos:
          context:
            - SAFETY_API_KEY
      - build-and-test-windows:
          context:
            - SAFETY_API_KEY
